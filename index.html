<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f7f5ef">
<title>Prospect Search</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="tabs" id="tabs">
  <button class="tab on" data-t="all">All</button>
  <button class="tab" data-t="t200">Top 200 Hitters</button>
  <button class="tab" data-t="t100">Top 100 Pitchers</button>
  <button class="tab" data-t="hs">Hot Sheet</button>
  <button class="tab" data-t="port">Portfolio</button>
</div>

<div class="hdr">
  <div class="si">
    <input id="search" placeholder="Search player or team..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="clear">×</button>
  </div>
</div>

<div class="chips" id="chips">
  <button class="chip on" data-f="all">All BR</button>
  <button class="chip" data-f="5">BR 5</button>
  <button class="chip" data-f="4">BR 4+</button>
  <button class="chip" data-f="owned">Owned</button>
  <button class="chip" data-f="sold">Sold</button>
</div>
<div class="chips2" id="chips2">
  <button class="chip on" data-p="all">All</button>
  <button class="chip" data-p="hit">Hitters</button>
  <button class="chip" data-p="pit">Pitchers</button>
</div>

<div class="meta"><span id="cntlbl">Loading...</span><div class="sort-chips" id="sortchips"></div></div>
<div class="list" id="list"><div class="spin"><div class="spin-ring"></div>Fetching from Google Sheets...</div></div>

<button class="rfab" id="rfab" title="Refresh">
  <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4c-4.42 0-8 3.58-8 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>

<div class="mwrap" id="mwrap">
  <div class="modal">
    <div class="mhandle"></div>
    <div id="mcontent"></div>
    <button class="close-btn" id="closebtn">Close</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
